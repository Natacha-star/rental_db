{% extends 'base.html' %}

{% block title %}Add New Customer - Rental Management{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card-minimal">
            <h3 class="mb-4 fw-600">Register New Customer</h3>
            <form action="{{ url_for('add_customer') }}" method="POST">
                <div class="mb-3">
                    <label for="full_name" class="form-label text-muted small fw-500">Full Name</label>
                    <input type="text" class="form-control py-2" id="full_name" name="full_name"
                        placeholder="Enter customer name" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label text-muted small fw-500">Phone Number</label>
                    <input type="text" class="form-control py-2" id="phone" name="phone"
                        placeholder="Example: 078xxxxxxx" required>
                </div>
                <div class="mb-4">
                    <label for="email" class="form-label text-muted small fw-500">Email Address</label>
                    <input type="email" class="form-control py-2" id="email" name="email"
                        placeholder="customer@email.com" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary-custom py-2">Add Customer</button>
                    <a href="{{ url_for('list_customers') }}" class="btn btn-edit py-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
