{% extends 'base.html' %}

{% block title %}Create Rental - Rental Management{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card-minimal">
            <h3 class="mb-4 fw-600">Register New Rental Agreement</h3>
            <form action="{{ url_for('add_rental') }}" method="POST">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="property_id" class="form-label text-muted small fw-500">Pick Available
                            Property</label>
                        <select class="form-select py-2" id="property_id" name="property_id" required>
                            <option value="">Select Property</option>
                            {% for property in properties %}
                            <option value="{{ property.property_id }}">{{ property.title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="customer_id" class="form-label text-muted small fw-500">Registering Customer</label>
                        <select class="form-select py-2" id="customer_id" name="customer_id" required>
                            <option value="">Select Customer</option>
                            {% for customer in customers %}
                            <option value="{{ customer.customer_id }}">{{ customer.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="start_date" class="form-label text-muted small fw-500">Agreement Start Date</label>
                        <input type="date" class="form-control py-2" id="start_date" name="start_date" required>
                    </div>
                    <div class="col-md-6">
                        <label for="end_date" class="form-label text-muted small fw-500">Agreement End Date
                            (Optional)</label>
                        <input type="date" class="form-control py-2" id="end_date" name="end_date">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="payment_status" class="form-label text-muted small fw-500">Initial Payment
                        Status</label>
                    <select class="form-select py-2" id="payment_status" name="payment_status" required>
                        <option value="Pending">Pending</option>
                        <option value="Paid">Paid</option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary-custom py-2">Create Agreement</button>
                    <a href="{{ url_for('list_rentals') }}" class="btn btn-edit py-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
