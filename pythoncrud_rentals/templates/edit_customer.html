{% extends 'base.html' %}

{% block title %}Edit Customer - Rental Management{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card-minimal">
            <h3 class="mb-4 fw-600">Update Customer Profile</h3>
            <form action="{{ url_for('edit_customer', id=customer.customer_id) }}" method="POST">
                <div class="mb-3">
                    <label for="full_name" class="form-label text-muted small fw-500">Full Name</label>
                    <input type="text" class="form-control py-2" id="full_name" name="full_name"
                        value="{{ customer.full_name }}" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label text-muted small fw-500">Phone Number</label>
                    <input type="text" class="form-control py-2" id="phone" name="phone" value="{{ customer.phone }}"
                        required>
                </div>
                <div class="mb-4">
                    <label for="email" class="form-label text-muted small fw-500">Email Address</label>
                    <input type="email" class="form-control py-2" id="email" name="email" value="{{ customer.email }}"
                        required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary-custom py-2">Save Changes</button>
                    <a href="{{ url_for('list_customers') }}" class="btn btn-edit py-2">Back to List</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
