{% extends 'base.html' %}

{% block title %}Edit Property - Rental Management{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card-minimal">
            <h3 class="mb-4 fw-600">Update Property Details</h3>
            <form action="{{ url_for('edit_property', id=property.property_id) }}" method="POST">

                <div class="mb-3">
                    <label for="title" class="form-label text-muted small fw-500">Property Title</label>
                    <input type="text" class="form-control py-2" id="title" name="title" value="{{ property.title }}"
                        required>
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label text-muted small fw-500">Location</label>
                    <input type="text" class="form-control py-2" id="location" name="location"
                        value="{{ property.location }}" required>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <label for="price" class="form-label text-muted small fw-500">Rent Amount (RWF)</label>
                        <input type="number" step="0.01" class="form-control py-2" id="price" name="price"
                            value="{{ property.price }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="status" class="form-label text-muted small fw-500">Availability Status</label>
                        <select class="form-select py-2" id="status" name="status" required>
                            <option value="Available" {{ 'selected' if property.status=='Available' }}>Available
                            </option>
                            <option value="Rented" {{ 'selected' if property.status=='Rented' }}>Rented</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary-custom py-2">Update Listing</button>
                    <a href="{{ url_for('list_properties') }}" class="btn btn-edit py-2">Back to List</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
